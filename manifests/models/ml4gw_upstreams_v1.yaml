      - pretrained BBNet checkpoints
      - serialized BBNet scalers
      - training and validation data
      - modified PArthENoPE source
      - modified AlterBBN source
      - MCMC or likelihood driver
    discrepancies:
      - >-
        README describes weights/ as a directory containing pretrained assets,
        but the pinned tree contains a one-byte regular file named weights.
      - README contains placeholder environment versions, data URL, and commands.
      - >-
        mape_for_parthenope.py expects kappa10/DN_eff/tau/omegabn and H2/H/Yp,
        while train_bbn_parthenope.py trains on OmegaBh^2/dn_nu/kappa/tau and
        H2/H/Y_p. It cannot evaluate that training output without an unrecorded
        schema conversion.
      - >-
        AlterBBN training consumes dd0/dd0_rad while evaluation consumes
        kappa10/DN_eff; the physical mapping is not defined in the repository.
      - >-
        Evaluation loads checkpoints with strict=False, which can hide missing
        or unexpected state-dict keys and is not acceptable for validation.

