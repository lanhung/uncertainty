name: one-time-manuscript-agents

on:
  push:
    branches:
      - science/manuscript-baseline-pivot
      - main
    paths:
      - 'scripts/apply_manuscript_pivot_to_agents.py'
      - '.github/workflows/one-time-manuscript-agents.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply manuscript-first charter migration
        run: python scripts/apply_manuscript_pivot_to_agents.py
      - name: Validate desired-state plan
        run: python orchestrator/reconcile.py plan/plan.yaml
      - name: Commit generated AGENTS update
        run: |
          if git diff --quiet -- AGENTS.md; then
            echo 'AGENTS.md already aligned'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add AGENTS.md
          git commit -m 'docs: align root AGENTS with manuscript-first pivot'
          git push origin HEAD:${GITHUB_REF_NAME}
