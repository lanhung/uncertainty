name: ops-tests

on:
  push:
    branches: [main]
    paths:
      - 'orchestrator/**'
      - 'taskctl/**'
      - 'worker/**'
      - 'scripts/**'
      - 'deploy/**'
      - 'tests/ops/**'
      - 'plan/plan.yaml'
      - 'project.config.yaml'
      - 'requirements-ops.txt'
      - 'Makefile'
      - '.github/workflows/ops-tests.yml'
  pull_request:
    paths:
      - 'orchestrator/**'
      - 'taskctl/**'
      - 'worker/**'
      - 'scripts/**'
      - 'deploy/**'
      - 'tests/ops/**'
      - 'plan/plan.yaml'
      - 'project.config.yaml'
      - 'requirements-ops.txt'
      - 'Makefile'
      - '.github/workflows/ops-tests.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-ops.txt
      - name: Install operations dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-ops.txt
      - name: Validate Python and shell entry points
        run: |
          python -m py_compile orchestrator/*.py taskctl/*.py worker/*.py scripts/*.py
          find scripts -maxdepth 1 -name '*.sh' -print0 | xargs -0 -n1 bash -n
      - name: Validate task DAG
        run: python orchestrator/reconcile.py plan/plan.yaml
      - name: Validate host-level resource lease wrapper
        run: |
          lock_root="$(mktemp -d)"
          RESEARCH_WORKER_LOCK_ROOT="$lock_root" \
            bash scripts/with_resource_lease.sh \
              --resource gpu0 --project ci --task lease-smoke -- \
              bash -c 'test -f "$RESEARCH_WORKER_LOCK_ROOT/gpu0.json"'
          test ! -e "$lock_root/gpu0.json"
      - name: Run operations tests
        run: PYTHONPATH=. python -W error::ResourceWarning -m unittest discover -s tests/ops -v
