name: one-time-uq-refocus

on:
  push:
    branches: [science/refocus-uncertainty-core]
    paths:
      - 'scripts/apply_uncertainty_refocus_to_agents.py'
      - '.github/workflows/one-time-uq-refocus.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply UQ-only charter correction
        run: python scripts/apply_uncertainty_refocus_to_agents.py
      - name: Validate UQ desired-state plan
        run: python orchestrator/reconcile.py plan/plan.yaml
      - name: Commit root AGENTS correction
        run: |
          if git diff --quiet -- AGENTS.md; then
            echo 'AGENTS.md already aligned'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add AGENTS.md
          git commit -m 'docs: refocus root charter on nuclear-rate uncertainty'
          git push origin HEAD:${GITHUB_REF_NAME}
