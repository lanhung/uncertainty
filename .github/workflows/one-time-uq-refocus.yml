name: one-time-uq-refocus

on:
  push:
    branches: [science/refocus-uncertainty-core]
    paths:
      - 'scripts/cleanup_uq_agents.py'
      - '.github/workflows/one-time-uq-refocus.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/cleanup_uq_agents.py'
      - '.github/workflows/one-time-uq-refocus.yml'
      - 'AGENTS.md'

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Apply final UQ-only charter cleanup
        run: python scripts/cleanup_uq_agents.py
      - name: Validate UQ desired-state plan
        run: python orchestrator/reconcile.py plan/plan.yaml
      - name: Commit root AGENTS cleanup
        run: |
          if git diff --quiet -- AGENTS.md; then
            echo 'AGENTS.md already clean'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add AGENTS.md
          git commit -m 'docs: clean remaining manuscript-era scope from charter'
          target_branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          git push origin HEAD:"${target_branch}"
