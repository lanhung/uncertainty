name: integrate-agents-ops

on:
  push:
    branches: [agent/research-ops-control-plane]
    paths:
      - 'scripts/integrate_agents_ops.py'

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Integrate operations rules into root AGENTS
        run: python scripts/integrate_agents_ops.py
      - name: Commit generated governance update
        run: |
          if git diff --quiet -- AGENTS.md; then
            echo 'AGENTS.md already integrated'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add AGENTS.md
          git commit -m 'docs: integrate operations rules into AGENTS'
          git push origin "HEAD:${GITHUB_REF_NAME}"
