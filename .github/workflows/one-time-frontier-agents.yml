name: one-time-frontier-agents

on:
  push:
    branches: [science/frontier-review-2026-07]
    paths:
      - 'scripts/apply_frontier_review_to_agents.py'
      - '.github/workflows/one-time-frontier-agents.yml'

permissions:
  contents: write

concurrency:
  group: one-time-frontier-agents
  cancel-in-progress: false

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply July 2026 frontier constraints
        run: python scripts/apply_frontier_review_to_agents.py
      - name: Validate desired-state plan
        run: python orchestrator/reconcile.py plan/plan.yaml
      - name: Commit generated AGENTS update
        run: |
          if git diff --quiet -- AGENTS.md; then
            echo 'AGENTS.md already aligned'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add AGENTS.md
          git commit -m 'docs: align root charter with July 2026 frontier review'
          git push origin HEAD:${GITHUB_REF_NAME}
