schema_version: 1
manuscript_id: JCAP-STIFF-LITHIUM-v1
status: pre_submission_release_and_reproduction_pending
registered_at_utc: "2026-07-23"
title: >-
  Testing a pre-BBN stiff phase with a four-abundance BBN emulator:
  no independent resolution of the cosmological lithium problem
target_journal: JCAP

scientific_question: >-
  Can a homogeneous pre-BBN stiff phase, including its self-consistent amplified
  stochastic gravitational-wave background, lower primordial lithium without
  violating the deuterium and helium abundance constraints?

physical_model:
  kappa10:
    definition: rho_stiff_over_rho_gamma_at_T_10_MeV
    equation: kappa10_equals_rho_phi_div_rho_gamma_at_T_equals_10_MeV
    units: dimensionless
    physical_bound: nonnegative
  hubble_extension:
    equation: >-
      H_equals_Hstd_times_sqrt_1_plus_kappa10_times_T_over_10MeV_power_3wphi_minus_1_plus_rhoGW_over_rhorad
    direct_path: homogeneous_stiff_energy_density
    indirect_path: SGWB_integrated_as_Delta_N_eff
  reheating:
    T_re_units: GeV
    DN_re_definition: e_folds_from_end_of_inflation_to_end_of_reheating
  tensor:
    parameters: [r, n_t]
    consistency_relation_case: n_t_equals_minus_r_over_8
  delta_neff:
    sampled_independently: false
    derived_from: SageNet_plus_spectrum_integral

bbnet_plus:
  inputs: [Omega_b_h2, Delta_N_eff, kappa10, tau_n_seconds]
  outputs: [Y_p, D_over_H, He3_over_H, Li7_over_H]
  backends: [stiff_extended_PArthENoPE, stiff_extended_AlterBBN]
  claimed_training_scale_per_backend: order_1e5
  parthenope_network: 26_nuclides_complete_network
  alterbbn_mode: RK2_halfstep_expert_configuration
  heldout_parthenope_test_size: 1033
  reported_p95_relative_error_percent:
    Y_p: 0.055
    D_over_H: 0.123
    He3_over_H: 0.120
    Li7_over_H: 0.158
  reported_single_point_median_ms: 2.43
  reported_parthenope_solver_median_ms: 25500
  reported_speedup: 10500

inference:
  sampler: Cobaya
  primary_scenario: full_search
  main_free_parameters:
    - H0
    - Omega_b_h2
    - Omega_c_h2
    - ln_1e10_A_s
    - log10_r
    - n_t
    - log10_T_re_GeV
    - DN_re
    - log10_kappa10
  sampled_nuisance:
    - tau_n_seconds
  derived:
    - Delta_N_eff_GW
  registered_diagnostics:
    - full_likelihood
    - D_over_H_plus_Y_p_only
    - Li7_only_nonviable_diagnostic
    - free_Delta_N_eff_at_kappa10_zero
    - free_kappa10_at_r_to_zero
    - fixed_n_t_schramm_slices

reported_results_for_reproduction_only:
  log10_kappa10_95:
    PArthENoPE: 0.52
    AlterBBN: 0.38
  D_over_H_plus_Y_p_log10_kappa10_95:
    PArthENoPE: 1.04
    AlterBBN: 1.02
  Li7_only_log10_kappa10_95:
    PArthENoPE: 2.37
    AlterBBN: 2.36
  Li7_only_median_D_over_H_times_1e5:
    PArthENoPE: 9.17
    AlterBBN: 8.75
  main_conclusion: >-
    No sampled homogeneous stiff-phase configuration lowers Li7/H to the stellar
    plateau while keeping Y_p and D/H within their registered observational bands.
  direct_numerical_benchmark:
    accepted_samples: 1000
    wall_seconds: 41400
    seconds_per_accepted_sample: 41
    posterior_interpretation_allowed: false

public_source_candidates:
  BBNet_plus:
    repository: https://github.com/Hdiao112/BBNet
    current_release_audit: pending_four_abundance_code_weights_scalers_and_data
  stiffGWpy:
    repository: https://github.com/bohuarolandli/stiffGWpy
    required_revision: pending_pin
  SageNet_plus:
    repository: https://github.com/YifangLuo/SageNet
    required_revision: pending_pin
  PArthENoPE:
    distribution: https://parthenope.na.infn.it/
    project_modification: pending_handoff_or_patch
  AlterBBN:
    public_release: alterbbn_v2.2
    project_modification: pending_handoff_or_patch

required_release_assets:
  - bbnet_plus_four_abundance_source
  - bbnet_plus_parthenope_weights_and_scalers
  - bbnet_plus_alterbbn_base_and_expert_weights_and_scalers
  - training_config_and_exact_environment
  - training_data_manifest_or_reproducible_generator
  - stiff_extended_parthenope_source_or_patch
  - stiff_extended_alterbbn_source_or_patch
  - sagenet_plus_source_weights_and_environment
  - stiffgwpy_exact_revision
  - cobaya_theory_likelihood_and_yaml_configs
  - main_and_partial_likelihood_chain_manifests
  - deterministic_scan_tables
  - figure_generation_scripts
  - zenodo_archive_with_checksums

submission_gates:
  all_references_resolved: false
  all_question_mark_placeholders_removed: false
  public_code_statement_verified: false
  public_weights_statement_verified: false
  modified_solver_availability_accurate: false
  core_results_reproduced_clean_environment: false
  chain_and_scan_archive_ready: false
  author_signoff: false
