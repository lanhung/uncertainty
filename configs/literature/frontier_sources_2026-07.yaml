schema_version: 1
registry_id: BBN-UQ-FRONTIER-2026-07
status: frozen_search_inventory_claims_not_cleared
review_date_utc: "2026-07-23"
governing_review: docs/literature/FRONTIER_REVIEW_2026-07.md
scope: >-
  Primary-source inventory for BBN thermonuclear-rate uncertainty, direct
  marginalization, abundance emulation, nuisance-aware simulation-based inference,
  calibration and current precision observations. Presence in this registry is
  not scientific endorsement and absence is not proof of nonexistence.

source_policy:
  primary_sources_required: true
  accepted_types:
    - peer_reviewed_journal
    - arxiv_primary_manuscript
    - official_repository
    - official_package_registry
    - official_data_archive
  monthly_refresh_required: true
  raw_urls_are_identifiers_not_citations: true

nuclear_probability_information:
  ETR25:
    title: The 2025 Evaluation of Experimental Thermonuclear Reaction Rates
    arxiv: "2601.20059"
    journal: Astrophysical Journal Supplement Series 283, 17 (2026)
    doi: "10.3847/1538-4365/ae2bdc"
    zenodo_doi: "10.5281/zenodo.17610211"
    code: https://github.com/rlongland/RatesMC
    evaluation_inputs: https://github.com/TUNL-Reaction-Rates-Group/2025-rates-evaluation
    scope:
      evaluated_rates: 78
      temperature_range: 1_MK_to_10_GK
      actual_pdf_percentiles: [16, 50, 84]
      factor_uncertainty_model: lognormal_approximation
      typical_mc_samples_per_non_bayesian_rate: 50000
    R0_coverage:
      dp_gamma_he3: table_6
      dd_n_he3: table_7
      dd_p_t: table_8
    project_role: primary_candidate_experimental_R0_prior
    required_action:
      - capture_exact_data_and_code_revisions
      - preserve_coherent_rate_curve_draws_across_temperature
      - compare_actual_pdf_percentiles_with_lognormal_approximation
      - register_missing_cross_reaction_covariance

  GP_deuterium_2026:
    title: A data-driven prediction for the primordial deuterium abundance
    arxiv: "2604.16600v1"
    submitted: "2026-04-17"
    source_archive_sha256: 1123d5327c48fd57c55626cbb804854b5c3832443f1f49dd3c04626ae97cd04d
    tex_sha256: 36bc00fba6626b5394b8820868325e0df8d2f7ee40899eb692dc9da0e161ab97
    reproducibility_availability:
      analysis_code: deferred_by_authors
      fitted_hyperparameters: unavailable
      posterior_draws: unavailable
      experimental_data_bundle: unavailable
      random_seed: unavailable
    reactions: [dp_gamma_he3, dd_n_he3, dd_p_t]
    method: gaussian_process_regression_on_experimental_nuclear_data
    key_results:
      - validated_unbiased_D_over_H_uncertainty
      - low_degree_polynomial_fits_can_overpredict_D_over_H
      - dd_measurements_0p1_to_0p6_MeV_are_high_value
    project_role: mandatory_functional_rate_baseline

  hierarchical_Be7_n_p_Li7:
    title: Hierarchical Bayesian Thermonuclear Rate for the Be7(n,p)Li7 BBN Reaction
    arxiv: "1912.06210"
    method: hierarchical_bayesian_R_matrix
    project_role: R1_posterior_provenance_example

  hierarchical_dp_gamma:
    title: Bayesian estimation of the D(p,gamma)3He thermonuclear reaction rate
    arxiv: "2109.00049"
    method: hierarchical_bayesian_nuclear_data_analysis
    project_role: compare_with_ETR25_and_solver_distributed_priors

