schema_version: 1
dataset_id: MANUSCRIPT-OBS-v1
status: frozen_for_exact_manuscript_reproduction_only
registered_at_utc: "2026-07-23"

purpose: >-
  Reproduce the abundance likelihood and neutron-lifetime prior used in the
  pre-submission four-abundance stiff-phase JCAP manuscript. This dataset is not
  the primary observation choice for the subsequent nuclear-rate UQ paper.

abundances:
  Y_p:
    mean: 0.245
    sigma: 0.003
    distribution: gaussian
    manuscript_role: likelihood
    units: mass_fraction
  D_over_H:
    mean: 2.508e-5
    sigma: 0.029e-5
    distribution: gaussian
    manuscript_role: likelihood
    units: number_ratio
  Li7_over_H:
    mean: 1.45e-10
    sigma: 0.25e-10
    distribution: gaussian
    manuscript_role: likelihood
    units: number_ratio
  He3_over_H:
    distribution: none
    manuscript_role: derived_diagnostic_only
    units: number_ratio

neutron_lifetime:
  mean_seconds: 878.4
  sigma_seconds: 0.5
  distribution: gaussian
  manuscript_role: sampled_prior

likelihood_variants:
  full:
    terms: [Y_p, D_over_H, Li7_over_H]
  D_over_H_plus_Y_p:
    terms: [Y_p, D_over_H]
  Li7_only_diagnostic:
    terms: [Li7_over_H]
    viable_cosmological_fit: false

separation_from_future_uq:
  future_primary_registry: configs/data/abundance_OBS-v1.yaml
  rule: >-
    MANUSCRIPT-OBS-v1 is immutable for paper reproduction. OBS-v1 remains the
    preregistered LBT/Cooke-led main dataset for the UQ sequel. Neither registry
    silently replaces the other.

provenance:
  source_status: manuscript_values_registered_source_bibliography_audit_pending
  immutable_source_manifest: pending
  independent_data_review: pending
