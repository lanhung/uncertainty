schema_version: 1
registry_id: CLAIM-EVIDENCE-v1
captured_at_utc: "2026-07-22"
registry_status: draft_evidence_mapping_not_claim_freeze
track_a_status: active
track_b_status: not_frozen
nature_tier_gate: closed

status_definitions:
  evidence_registered_review_pending: artifact_exists_but_required_independent_review_is_open
  scope_limited_evidence: evidence_supports_only_the_explicitly_named_slice
  incomplete: some_required_evidence_exists_but_the_claim_gate_is_open
  unavailable: no_reportable_claim_at_this_tier

global_rules:
  - A claim is reportable only within its registered evidence scope.
  - Missing evidence cannot be replaced by model output or agent judgment.
  - C3 and C4 claims require independent A09 evidence and A00 approval.
  - Negative and null results are retained and trigger registered stop rules.
  - Auxiliary metrics cannot substitute for physical or computational endpoints.

