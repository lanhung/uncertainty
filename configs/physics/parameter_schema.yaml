schema_version: 1
schema_id: PHYSICS-PARAMETERS-v1
decision_date_utc: "2026-07-23"
status: manuscript_stiff_semantics_registered_backend_mappings_pending
track_b_gate_status: closed
manuscript_contract: configs/manuscript/jcap_stiff_lithium_v1.yaml

standard_bbn_fiducial:
  purpose: common_direct_solver_benchmark_point
  selection_rule: >-
    Values are inherited from the frozen CMB-v1 main-stage mean and NEUTRON-v1
    N0 mean. Null values are used for extension coordinates. No value was
    selected using solver timing or abundance output.
  values:
    omega_b_h2: 0.02237
    delta_neff: 0.0
    tau_n_seconds: 878.3
    kappa10: 0.0
  sources:
    omega_b_h2: configs/data/cmb_data_v1.yaml#main_stage
    tau_n_seconds: configs/physics/neutron_lifetime_v1.yaml#scenarios.N0
    delta_neff: standard_model_null
    kappa10: configs/manuscript/jcap_stiff_lithium_v1.yaml#physical_model.kappa10

parameters:
  omega_b_h2:
    symbol: Omega_b h^2
    definition: physical baryon density parameter
    units: dimensionless
    sampling_transform: identity
    role: core_parameter
    prior:
      distribution: normal
      mean: 0.02237
      sigma: 0.00015
      source: configs/data/cmb_data_v1.yaml#main_stage
    physical_bounds:
      lower: 0.0
      upper: null
      lower_inclusive: false
    fiducial: 0.02237
    sensitive_data: [CMB, D_over_H, Y_p, Li7_over_H]
    identifiability_risk: correlated_with_nuclear_rates_and_expansion_history
    freeze_status: frozen_for_standard_bbn_benchmark

  delta_neff:
    symbol: Delta N_eff
    definition: additive change in effective relativistic degrees of freedom
    units: dimensionless
    sampling_transform: identity
    role: derived_or_diagnostic_extension_parameter
    manuscript_use:
      primary_full_search: derived_from_SageNet_plus_SGWB_integral
      free_diagnostic: independently_varied_only_at_kappa10_zero
      main_training_range: [0.0, 1.0]
      hard_rejection_above: 5.0
    prior:
      status: not_frozen_for_future_uq
      legacy_training_range: [-1.0, 1.0]
    physical_bounds:
      rule: total_Neff_must_remain_positive
      implementation_status: adapter_specific_check_pending
    fiducial: 0.0
    sensitive_data: [Y_p, D_over_H, Li7_over_H, CMB, SGWB]
    identifiability_risk: correlated_with_omega_b_h2_tau_n_and_kappa10
    freeze_status: manuscript_semantics_registered

  tau_n_seconds:
    symbol: tau_n
    definition: free-neutron lifetime
    units: s
    sampling_transform: identity
    role: nuisance_parameter
    prior:
      scenario_registry: configs/physics/neutron_lifetime_v1.yaml
      primary_scenario: N0
      manuscript_reproduction: configs/data/manuscript_abundance_v1.yaml#neutron_lifetime
    physical_bounds:
      lower: 0.0
      upper: null
      lower_inclusive: false
    fiducial: 878.3
    sensitive_data: [Y_p, D_over_H, Li7_over_H]
    identifiability_risk: >-
      Must not be double counted through both tau_n and weak-rate normalization.
    freeze_status: frozen

  kappa10:
    symbol: kappa_10
    definition: >-
      Ratio rho_stiff/rho_gamma evaluated at photon temperature T = 10 MeV.
      It is the amplitude of the homogeneous pre-BBN stiff component used in
      the manuscript and stiffGWpy.
    units: dimensionless
    authoritative_sources:
      - configs/manuscript/jcap_stiff_lithium_v1.yaml#physical_model.kappa10
      - https://github.com/bohuarolandli/stiffGWpy#input
    expansion_mapping:
      direct_term: >-
        H/H_std contains sqrt(1 + kappa10*(T/10 MeV)^(3*(w_phi-1/3)) + rho_GW/rho_rad)
      reference_temperature_MeV: 10.0
      equation_of_state_condition: w_phi_greater_than_one_third
      kination_limit: w_phi_equals_1
    sampling_transform:
      positive_branch: log10
      manuscript_range: [-7.0, 3.0]
      null_value: 0.0
      null_handling: explicit_standard_model_spike_not_log_transformed
    role: extension_parameter
    prior:
      manuscript_reproduction:
        distribution: uniform_in_log10
        log10_range: [-7.0, 3.0]
      future_uq_status: not_frozen
    physical_bounds:
      lower: 0.0
      upper: null
      lower_inclusive: true
    backend_mapping:
      PArthENoPE_modified: pending_exact_source_or_patch
      AlterBBN_dd0: pending_exact_authoritative_conversion
      rule: do_not_infer_backend_mapping_from_names
    fiducial: 0.0
    sensitive_data: [Y_p, D_over_H, He3_over_H, Li7_over_H, SGWB]
    identifiability_risk: correlated_with_tensor_tilt_reheating_and_Delta_N_eff
    freeze_status: physical_definition_frozen_backend_mapping_pending

  tensor_to_scalar_ratio:
    symbol: r
    definition: primordial tensor-to-scalar ratio used to normalize the SGWB
    units: dimensionless
    sampling_transform: log10
    role: extension_parameter
    prior:
      manuscript_log10_range: [-40.0, 0.0]
      future_uq_status: not_frozen
    physical_bounds:
      lower: 0.0
      upper: null
      lower_inclusive: true
    fiducial: null
    sensitive_data: [SGWB, Delta_N_eff]
    freeze_status: manuscript_semantics_registered

  tensor_tilt:
    symbol: n_t
    definition: >-
      Phenomenological primordial/high-frequency tensor spectral tilt controlling
      the SGWB contribution. The manuscript samples it freely and also retains
      an inflationary-consistency robustness model.
    units: dimensionless
    sampling_transform: identity
    role: core_or_derived_parameter_by_registered_model
    prior:
      manuscript_free_range: [-1.0, 6.0]
      future_uq_status: not_frozen
    physical_bounds:
      status: model_dependent
    fiducial: null
    sensitive_data: [SGWB, Delta_N_eff, BBN]
    identifiability_risk: correlated_with_tensor_amplitude_reheating_and_stiff_history
    required_models:
      free_tensor_tilt:
        sampled: true
      inflationary_consistency_relation:
        relation: n_t_equals_minus_r_over_8
        sampled_independently: false
      kination_transfer_reference:
        alpha_stiff: 1.0
        note: physical_reference_slice_not_the_only_sampled_model
    freeze_status: manuscript_models_registered_future_prior_pending

  reheating_temperature:
    symbol: T_re
    definition: >-
      Reheating temperature marking the end of reheating and the onset of the
      conventional hot radiation-dominated history used by the stiff/SGWB model.
    units: GeV
    sampling_transform: log10
    role: extension_parameter
    prior:
      manuscript_log10_GeV_range: [-3.0, 7.0]
      future_uq_status: not_frozen
    physical_bounds:
      lower_GeV: 1.0e-3
      lower_reason: reheating_must_complete_before_BBN
      upper_GeV: null
    fiducial: null
    sensitive_data: [SGWB, Delta_N_eff, BBN]
    identifiability_risk: correlated_with_tensor_tilt_and_reheating_duration
    freeze_status: manuscript_semantics_registered

  reheating_duration_efolds:
    symbol: Delta N_re
    definition: >-
      Number of e-folds from the end of inflation to the end of reheating under
      the manuscript's matter-like reheating evolution.
    units: e_folds
    sampling_transform: identity
    role: extension_parameter
    prior:
      manuscript_range: [0.0, 40.0]
      future_uq_status: not_frozen
    physical_bounds:
      lower: 0.0
      upper: null
      lower_inclusive: true
    fiducial: null
    sensitive_data: [SGWB, Delta_N_eff]
    identifiability_risk: largely_prior_dominated_in_manuscript
    freeze_status: manuscript_semantics_registered

parameter_families:
  nuclear_rate_q:
    symbol: q_i
    role: nuisance_parameter
    distribution_baseline: standard_normal
    first_decision_focused_registry: configs/physics/nuclear_core6_no_go_v1.yaml
    full_dimension: pending_NUC_v1_registry
    freeze_status: pending_nuclear_prior
  functional_rate_modes:
    symbol: a_ik
    role: nuisance_parameter
    distribution_baseline: standard_normal
    dimension: conditional_on_scalar_gate_and_basis_validation
    freeze_status: pending_nuclear_prior
  solver_choices:
    symbols: [E, R, W, X, nu]
    role: registered_discrete_model_choices
    registry: docs/decisions/ADR-SOLVER-FACTORIAL-v1.md
    freeze_status: pending_factorial_execution

adapter_aliases:
  common:
    omega_b_h2: [OmegaBh2, omegabn]
    delta_neff: [DeltaNeff, dn_nu, DN_eff, delta_N_eff]
    tau_n_seconds: [tau_n, tau]
    kappa10: [kappa, kappa10]
    reheating_temperature: [T_re, Tre]
    reheating_duration_efolds: [DN_re, DeltaNre]
  prohibited_unresolved_mappings:
    - from: kappa10
      to: dd0
      reason: exact_modified_AlterBBN_conversion_not_yet_handed_off
    - from: delta_neff
      to: dd0_rad
      reason: exact_modified_AlterBBN_conversion_not_yet_handed_off

validation_rules:
  - Reject unknown parameter names rather than silently dropping them.
  - Record canonical and adapter-transformed values in every run manifest.
  - The physical definition of kappa10 is frozen; backend-specific dd0 mappings are not.
  - Do not interpret a manuscript training range as the future UQ inference prior.
  - Standard-BBN direct benchmarks may use only the frozen fiducial subset.
  - MANUSCRIPT-OBS-v1 and OBS-v1 must be named explicitly and never mixed silently.

open_blockers:
  - exact_modified_PArthENoPE_source_or_patch
  - exact_modified_AlterBBN_kappa10_DeltaNeff_mapping
  - exact_BBNet_plus_training_and_inference_asset_handoff
  - NUC_CORE6_numerical_scalar_priors
  - NUC_v1_full_rate_and_functional_mode_registry
