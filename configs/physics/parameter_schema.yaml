schema_version: 2
schema_id: PHYSICS-PARAMETERS-UQ-v1
decision_date_utc: "2026-07-23"
status: standard_bbn_uq_scope_frozen_extensions_optional
production_gate_status: closed_pending_UQ2_GATE_REPORT
scientific_scope: docs/science/UNCERTAINTY_SCOPE_v1.md

standard_bbn_fiducial:
  purpose: common_rate_uncertainty_and_direct_solver_benchmark
  selection_rule: >-
    Values are inherited from the frozen CMB-v1 main-stage mean and NEUTRON-v1
    N0 mean. Extension coordinates are set to their standard-model null values.
    No value was selected using a favorable uncertainty or posterior result.
  values:
    omega_b_h2: 0.02237
    delta_neff: 0.0
    tau_n_seconds: 878.3
  sources:
    omega_b_h2: configs/data/cmb_data_v1.yaml#main_stage
    tau_n_seconds: configs/physics/neutron_lifetime_v1.yaml#scenarios.N0
    delta_neff: standard_model_null

parameters:
  omega_b_h2:
    symbol: Omega_b h^2
    definition: physical baryon density parameter
    units: dimensionless
    sampling_transform: identity
    role: core_cosmological_parameter
    prior:
      distribution: normal
      mean: 0.02237
      sigma: 0.00015
      source: configs/data/cmb_data_v1.yaml#main_stage
    physical_bounds:
      lower: 0.0
      upper: null
      lower_inclusive: false
    fiducial: 0.02237
    primary_outputs: [D_over_H, Y_p]
    optional_outputs: [He3_over_H, Li7_over_H]
    identifiability_risk: correlated_with_nuclear_rates_and_expansion_history
    freeze_status: frozen_for_standard_bbn_uq

  delta_neff:
    symbol: Delta N_eff
    definition: additive change in effective relativistic degrees of freedom
    units: dimensionless
    sampling_transform: identity
    role: optional_extension_parameter
    prior:
      status: not_active_in_stage_R0
      future_freeze_required: true
    physical_bounds:
      rule: total_Neff_must_remain_positive
      implementation_status: adapter_specific_check_required
    fiducial: 0.0
    sensitive_outputs: [Y_p, D_over_H]
    identifiability_risk: correlated_with_omega_b_h2_tau_n_and_rate_nuisances
    activation_rule: after_standard_BBN_UQ_baseline_and_signed_gate
    freeze_status: standard_model_null_only

  tau_n_seconds:
    symbol: tau_n
    definition: free-neutron lifetime
    units: s
    sampling_transform: identity
    role: weak_physics_nuisance_parameter
    prior:
      scenario_registry: configs/physics/neutron_lifetime_v1.yaml
      primary_scenario: N0
    physical_bounds:
      lower: 0.0
      upper: null
      lower_inclusive: false
    fiducial: 878.3
    sensitive_outputs: [Y_p, D_over_H]
    identifiability_risk: >-
      Must not be double counted through both tau_n and a weak-rate
      normalization nuisance.
    freeze_status: frozen_by_neutron_registry

optional_nonstandard_parameters:
  kappa10:
    symbol: kappa_10
    definition: >-
      Optional downstream stiff-expansion coordinate. A public convention defines
      it as rho_stiff/rho_gamma at T=10 MeV, but it is not part of the active
      standard-BBN uncertainty gate.
    units: dimensionless
    role: optional_case_study_parameter
    prior:
      status: not_frozen
    activation_rule: after_UQ2_gate_and_separate_model_contract
    backend_mappings:
      status: not_required_for_active_R0_R1_work
      rule: never_infer_dd0_or_other_internal_mappings_from_names
    freeze_status: inactive_optional

  tensor_tilt:
    symbol: n_t
    definition: model-dependent primordial tensor spectral tilt
    units: dimensionless
    role: optional_case_study_parameter
    prior:
      status: not_frozen
    activation_rule: after_UQ2_gate_and_separate_SGWB_contract
    freeze_status: inactive_optional

  reheating_temperature:
    symbol: T_re
    definition: model-dependent reheating temperature
    units: model_contract_required
    role: optional_case_study_parameter
    prior:
      status: not_frozen
    activation_rule: after_UQ2_gate_and_separate_reheating_contract
    freeze_status: inactive_optional

parameter_families:
  nuclear_rate_z_R0:
    symbols:
      - z_dp_gamma_he3
      - z_dd_n_he3
      - z_dd_p_t
    role: thermonuclear_rate_nuisance_parameters
    registry: configs/physics/nuclear_stage0_R0_v1.yaml
    distribution_baseline: multivariate_normal
    covariance_status: pending_registry_completion
    freeze_status: scope_frozen_numerical_priors_pending

  nuclear_rate_z_extended:
    symbol: z_i
    role: thermonuclear_rate_nuisance_parameters
    dimension: conditional_on_R0_R1_gates
    distribution_baseline: registered_lognormal_or_posterior
    freeze_status: inactive_until_expansion_gate

  functional_rate_modes:
    symbol: a_ik
    role: function_valued_rate_nuisance_parameters
    distribution_baseline: standard_normal_after_basis_whitening
    dimension: conditional_on_scalar_theta_dependence_and_basis_validation
    freeze_status: inactive_until_signed_gate

  solver_choices:
    symbols: [E, R, W, X, nu]
    role: registered_discrete_model_choices
    registry: docs/decisions/ADR-SOLVER-FACTORIAL-v1.md
    active_R0_scope:
      X: standard_BBN_only
      outputs: [Y_p, D_over_H]
    freeze_status: public_paths_and_matched_factors_pending

abundance_outputs:
  primary_R0:
    - name: Y_p
      convention: helium4_mass_fraction
    - name: D_over_H
      convention: number_ratio
  optional_R1:
    - name: He3_over_H
      convention: number_ratio
    - name: Li7_over_H
      convention: number_ratio_including_post_BBN_Be7_decay_as_solver_defined
  rule: >-
    Every adapter records raw solver outputs, conversion formulae and canonical
    values; outputs with incompatible conventions are not compared silently.

adapter_aliases:
  common:
    omega_b_h2: [OmegaBh2, omegabn]
    delta_neff: [DeltaNeff, dn_nu, DN_eff, delta_N_eff]
    tau_n_seconds: [tau_n, tau]
  rate_nuisance:
    z_dp_gamma_he3: [q_dpHe3g, dpHe3g_q]
    z_dd_n_he3: [q_ddHe3n, ddHe3n_q]
    z_dd_p_t: [q_ddtp, ddtp_q]
  prohibited_silent_mappings:
    - from: any_rate_low_high_flag
      to: standard_normal_z
      reason: conversion_requires_source_specific_lognormal_definition
    - from: solver_internal_rate_index
      to: canonical_reaction_id
      reason: mapping_must_be_versioned_and_tested

validation_rules:
  - Reject unknown parameter and nuisance names rather than silently dropping them.
  - Record canonical and adapter-transformed values in every run manifest.
  - Standard-BBN R0 work must not depend on any manuscript or SGWB asset.
  - Do not use a solver training range as an inference prior without a separate decision.
  - Do not assume missing rate covariance means independent nuisances.
  - Do not combine tau_n and weak normalization in a way that double counts the same uncertainty.
  - Every rate perturbation must pass central and symmetric regression tests before Monte Carlo labels are generated.
  - Optional non-standard parameters require a separate signed activation contract.

open_blockers:
  - R0_rate_central_curves_units_uncertainties_and_checksums
  - R0_cross_rate_covariance_or_registered_missing_covariance_stress
  - public_solver_rate_ID_mappings
  - weak_normalization_and_tau_n_double_counting_audit
  - frozen_standard_BBN_point_manifest
  - UQ2_64_point_manifest_and_gate_report
