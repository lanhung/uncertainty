  sha256: f9f7436378fe8d0985d03ca5e5b48012820948c6a391081438939b63c58df7ba
  semantics: >-
    Low, Median and High are actual pointwise p16, p50 and p84 values. Factor
    uncertainty is a separate scalar lognormal approximation.

