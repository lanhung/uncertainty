  path: artifacts/priors/ETR25-R0-RATE-PDF-AUDIT-v1/audit.json
  sha256: 33adba011bc0eddeee6f31b8b43a873cdae30f15c6d1e92aa50fdeafeea9af20
  builder: scripts/build_etr25_R0_rate_pdf_audit.py
  validator: scripts/validate_etr25_R0_rate_pdf_audit_v1.py

metric_contract:
  definitions:
    L: actual_p16
    M: actual_p50
    H: actual_p84
    F: factor_uncertainty
    lower_log_width: ln_M_over_L
    upper_log_width: ln_H_over_M
    sigma_lognormal: ln_F
    log_asymmetry: upper_log_width_minus_lower_log_width
    scale_mismatch: >-
      one_half_times_lower_plus_upper_log_width_minus_sigma_lognormal
  endpoint_convention: >-
    Compare L and H to the ETR25 68-percent scalar proxy endpoints M/F and M*F.
    These q=+/-1 endpoints are not the exact Normal p16/p84 z scores.
  lower_residual_sign: ln_of_M_over_F_divided_by_L
  upper_residual_sign: ln_of_M_times_F_divided_by_H
  rounding:
    assumption: round_to_nearest_at_four_significant_digits
    method: propagate_each_printed_value_plus_or_minus_half_last_decimal_unit
    interpretation: >-
      An interval containing zero means only that the endpoint identity is not
      distinguishable at the public table precision. It does not validate a
      joint or full lognormal PDF.

