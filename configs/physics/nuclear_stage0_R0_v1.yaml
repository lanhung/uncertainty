    temperature_grid: ETR25_common_60_point_T9_0p001_to_10
    units: cm3_mol_minus1_s_minus1_verified
    actual_pdf_or_samples: actual_percentiles_only_full_samples_not_in_public_release
    actual_percentiles: p16_p50_p84_captured
    lognormal_factor_uncertainty: captured_separately_from_actual_percentiles
