schema_version: 2
registry_id: NUCLEAR-STAGE0-R0-v1
status: scope_and_source_policy_frozen_numerical_capture_pending
registered_at_utc: "2026-07-23"
frontier_review: docs/literature/FRONTIER_REVIEW_2026-07.md
source_registry: configs/literature/frontier_sources_2026-07.yaml
scientific_scope: >-
  Minimal self-contained reaction-rate nuisance set for validating BBN theoretical
  bands, covariance convergence, abundance-distribution learning and the validity
  of a fixed post-hoc theoretical covariance. This is not a claim that other
  reactions are irrelevant.

primary_outputs:
  - Y_p
  - D_over_H
secondary_outputs_when_available:
  - He3_over_H
  - Li7_over_H

cosmology_stage:
  primary: standard_BBN
  optional_after_gate:
    - delta_neff
    - nonstandard_expansion

prior_source_policy:
  primary_candidate: ETR25
  primary_candidate_reference:
    arxiv: "2601.20059"
    doi: "10.3847/1538-4365/ae2bdc"
    zenodo_doi: "10.5281/zenodo.17610211"
    RatesMC_repository: https://github.com/rlongland/RatesMC
    evaluation_repository: https://github.com/TUNL-Reaction-Rates-Group/2025-rates-evaluation
  source_capture_status: pending_exact_revision_and_checksum
  actual_pdf_policy: >-
    ETR25 low, median and high values are percentiles of the actual rate
    probability density, whereas factor uncertainty is a log-normal
    approximation. Both representations must be propagated and compared before
    the scalar log-normal model is frozen.
  coherent_curve_policy: >-
    A nuclear-input realization must produce one coherent rate curve across the
    full temperature grid. Independent random perturbations at each temperature
    bin are prohibited unless they are draws from an explicitly registered
    function-valued posterior with its covariance.
  cross_reaction_policy: >-
    Missing published cross-reaction covariance must be recorded as unmodeled and
    tested through a preregistered stress model; absence of covariance is not
    evidence of independence.
  solver_table_policy: >-
    A rate table distributed with a BBN solver is a software/input lineage and is
    not automatically the authoritative nuclear-data posterior.

