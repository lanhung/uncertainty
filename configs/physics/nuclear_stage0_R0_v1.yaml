weak_physics:
  neutron_lifetime:
    registry: configs/physics/neutron_lifetime_v1.yaml
    ordinary_thermonuclear_rate: false
  weak_normalization:
    status: pending_solver_audit
  double_counting_prohibited: true

nuisance_contract:
  scalar_baseline_equation: log_r_i_T_equals_log_rbar_i_T_plus_z_i_sigma_i_T
  scalar_baseline_distribution: multivariate_normal
  scalar_covariance_matrix: pending
  scalar_model_role: approximation_and_solver_interface_baseline
  actual_pdf_model:
    status: pointwise_percentiles_ingested_coherent_actual_posterior_unavailable
    comparison_to_scalar_required: true
  independence_assumed: false
  missing_covariance_policy: >-
    Record missing correlations explicitly and run a preregistered correlation
    stress test; absence of covariance is not evidence of independence.
  legacy_solver_envelope_mapping_contract: >-
    configs/physics/nuclear_prior_R0_engineering_v1.yaml
  legacy_contract_role: native_uncertainty_reproduction_and_interface_calibration_only

mandatory_direct_reproduction:
  baselines:
    - PRIMAT_native_run_mc_or_mc_uncertainty
    - PRyMordial_explicit_rate_marginalization
    - LINX_nuclear_rates_q_central_and_symmetric_checks
    - one_2026_sensitivity_atlas_R0_slice
    - structure_of_2026_GP_deuterium_prior
  scientific_role: reproduction_and_calibration_not_novelty

rate_pdf_audit:
  task_id: UQ0-RATE-PDF-AUDIT
  per_reaction_outputs:
    - source_actual_percentiles
    - source_lognormal_factor_uncertainty
    - asymmetry_of_low_median_high
    - temperature_dependence_of_approximation_error
    - coherent_curve_draw_validation
    - BBN_window_summary
  BBN_temperature_window: preregister_after_solver_and_rate_grid_audit
  pass_rule: >-
    The scalar baseline may enter production only after the difference from the
    actual or posterior-derived representation is quantified and either shown to
    satisfy the frozen null budget or retained as an explicit model comparison.

monte_carlo_protocol:
  frozen_fiducial_manifest: pending
  initial_draws: 1000
  cumulative_checkpoints: [100, 300, 1000]
  optional_extensions: [3000, 10000]
  convergence_metrics:
    - mean_relative_change
    - covariance_relative_change
    - quantile_absolute_change
    - tail_probability_change
    - cross_abundance_correlation_change
    - actual_pdf_vs_lognormal_difference
  every_draw_records:
    - seed
    - nuclear_input_draw_id
    - coherent_rate_curve_hashes
    - nuisance_vector_or_posterior_draw_reference
    - solver_revision
    - rate_source_revision
    - config_hash
    - outputs
    - structured_status
    - runtime_seconds

acceptance_before_label_generation:
  - ETR25_or_alternative_source_files_have_immutable_revisions_and_checksums
  - all_three_rates_have_verified_temperature_grids_and_units
  - actual_percentiles_or_posterior_products_are_registered
  - scalar_lognormal_approximation_has_been_audited
  - coherent_rate_curve_sampling_is_validated
  - solver_rate_mappings_pass_plus_minus_one_regression
  - cross_reaction_covariance_is_modeled_or_has_a_frozen_stress_test
  - weak_uncertainty_is_not_double_counted
  - PRIMAT_PRyMordial_and_LINX_direct_baselines_are_reproduced_or_explicitly_blocked
  - source_and_config_checksums_are_frozen

expansion_rules:
  add_lithium_or_helium_rates_after:
    - stage0_pipeline_passes
    - missing_output_variance_or_posterior_sensitivity_is_demonstrated
  add_functional_modes_after:
    - scalar_or_actual_pdf_theta_dependence_or_tail_failure_is_demonstrated
    - posterior_derived_basis_is_available
    - cross_validation_passes
  add_full_network_after:
    - core_set_fails_variance_or_coverage_budget
    - production_need_is_signed
  add_learned_models_after:
    - UQ2_GATE_REPORT_is_G1_or_higher
    - direct_workload_and_baselines_are_measured
