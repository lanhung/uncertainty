  delta_neff: 0.0
  tau_n_seconds: 878.3

fast_designs:
  sigma_point_9:
    dimension: 4
    coordinates: [q_dp_gamma_he3, q_dd_n_he3, q_dd_p_t, q_tau_n]
    rule: center_plus_symmetric_axis_points
    purpose: sign_linearity_failure_smoke
    publication_quantiles_allowed: false

  gauss_hermite_81:
    dimension: 4
    nodes_per_dimension: 3
    total_nodes: 81
    standard_normal_transform: q_equals_sqrt_2_times_physicists_Hermite_node
    normalized_weight: tensor_product_weight_divided_by_pi_power_d_over_2
    purpose: deterministic_mean_covariance_and_likelihood_reference

  gauss_hermite_refinement:
    dimension: 4
    nodes_per_dimension: 5
    total_nodes: 625
    activation_rule: only_if_81_node_moments_or_direct_likelihood_fail_convergence

  qmc_tail_check:
    sequence: scrambled_Sobol
    cumulative_sizes: [128, 256, 512, 1024]
    activation_rule: only_if_tail_skew_or_quantile_error_is_decision_relevant
    common_random_numbers_across_theta: true

omega_b_h2_fast_grid:
  source_mean: 0.02237
  source_sigma: 0.00015
  standardized_offsets: [-2.0, -1.0, 0.0, 1.0, 2.0]
  values: [0.02207, 0.02222, 0.02237, 0.02252, 0.02267]
  role: first_covariance_drift_and_direct_posterior_smoke

acceptance_and_stop_rules:
  structured_failure_fraction_max: 0.01
  sigma_point_vs_GH81_moment_difference_in_units_of_theory_sigma_max: 0.02
  GH81_vs_GH625_moment_difference_in_units_of_theory_sigma_max: 0.01
  covariance_drift_null_fraction: 0.05
  posterior_shift_null_sigma: 0.10
  fast_stop_posterior_shift_sigma: 0.05
  credible_interval_ratio_null: [0.95, 1.05]
  topology_change_allowed_under_null: false
  scale_to_1000_draws_when:
    - GH81_or_GH625_does_not_converge
    - non_Gaussian_tail_is_visible_and_decision_relevant
    - correlation_stress_changes_a_registered_endpoint
    - publication_grade_MC_crosscheck_is_required

publication_upgrade:
  required_before_unqualified_nuclear_posterior_claim:
    - original_or_reproducible_nuclear_input_posterior_or_explicit_prior_family_scope
    - A03_nuclear_data_review
    - A00_scientific_lead_review
    - A09_independent_validation
    - matched_second_solver_for_claimed_effect
