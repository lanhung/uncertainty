    interpolation: linear_in_perturbed_rate_over_T9
    upstream_out_of_grid_behavior: zero
    project_out_of_grid_policy: reject_before_solver_call
    native_sampling: prohibited_use_external_manifest
    all_non_R0_rate_parameters: zero
    reaction_parameters:
      z_dp_gamma_he3:
        internal_rate_id: dpHe3g
        nuclear_rates_q_index: 1
        transform: q_1_equals_z_dp_gamma_he3
      z_dd_n_he3:
