schema_version: 1
registry_id: NUC-CORE6-NOGO-v1
status: reaction_set_frozen_numerical_priors_pending
registered_at_utc: "2026-07-23"
task_id: UQ0-CORE6-RATE-REGISTRY

scientific_endpoint: >-
  Test whether nuclear-rate and weak-rate uncertainty changes the conclusion that
  a homogeneous pre-BBN stiff phase cannot lower Li7/H to the stellar plateau
  while retaining acceptable D/H and Y_p.

selection_rule: >-
  Include the three dominant deuterium-burning rates that control the D/H cost
  and the three production/destruction rates that directly control the Be7/Li7
  branch identified in the manuscript. This is a decision-focused first-stage
  set, not a claim that all other BBN rates are irrelevant.

reactions:
  - reaction_id: dp_gamma_he3
    equation: d(p,gamma)3He
    role: deuterium_destruction_and_He3_feed
    scalar_prior_status: pending
    functional_mode_status: conditional_after_gate
  - reaction_id: dd_n_he3
    equation: d(d,n)3He
    role: deuterium_destruction_and_He3_feed
    scalar_prior_status: pending
    functional_mode_status: conditional_after_gate
  - reaction_id: dd_p_t
    equation: d(d,p)t
    role: deuterium_destruction_and_tritium_feed
    scalar_prior_status: pending
    functional_mode_status: conditional_after_gate
  - reaction_id: he3_alpha_gamma_be7
    equation: 3He(alpha,gamma)7Be
    role: dominant_Be7_production_at_CMB_baryon_density
    scalar_prior_status: pending
    functional_mode_status: conditional_after_gate
  - reaction_id: be7_n_p_li7
    equation: 7Be(n,p)7Li
    role: Be7_destruction_and_Li7_conversion
    scalar_prior_status: pending
    functional_mode_status: conditional_after_gate
  - reaction_id: li7_p_alpha_he4
    equation: 7Li(p,alpha)4He
    role: downstream_Li7_destruction
    scalar_prior_status: pending
    functional_mode_status: conditional_after_gate

weak_physics:
  neutron_lifetime_registry: configs/physics/neutron_lifetime_v1.yaml
  ordinary_rate_entry: false
  weak_normalization_double_counting_prohibited: true

required_scalar_fields_per_reaction:
  - immutable_source_version
  - source_checksum
  - central_rate_curve
  - temperature_grid_and_units
  - lognormal_sigma_T_or_equivalent_posterior
  - correlation_or_explicit_unmodeled_correlation
  - forward_reverse_mapping
  - LINX_PRyMordial_PRIMAT_mapping_where_available
  - manuscript_backend_mapping_where_available

smoke_protocol:
  points: 16
  perturbations_default: [-1, 0, 1]
  optional_tail_perturbations: [-2, 2]
  derivative: symmetric_finite_difference_with_two_step_sizes
  outputs: [Y_p, D_over_H, He3_over_H, Li7_over_H]
  decision_proxies:
    - log10_kappa10_95_shift
    - minimum_D_over_H_tension_at_Li7_plateau
    - minimum_Y_p_tension_at_Li7_plateau
    - viable_region_indicator
    - backend_disagreement
  scientific_claim_allowed: false

formal_gate:
  protocol: docs/decisions/ADR-FISHER-GATE-v1.md
  required_points: 64
  scalar_smoke_does_not_replace_gate: true

expansion_policy:
  add_reactions_only_after:
    - scalar_smoke_or_Fisher_identifies_missing_decision_variance
    - source_and_mapping_are_registered
  functional_modes_only_after:
    - scalar_gate_shows_decision_relevance
    - posterior_derived_basis_exists
    - cross_validation_passes
