units: s
decision_status: frozen
track_b_gate_status: closed_pending_signoff

scenarios:
  N0:
    label: primary_pdg_2026_ucn_average
    role: main_baseline
    distribution: normal
    mean: 878.3
    sigma: 0.4
    source_id: pdg_2026_neutron_listing
    notes:
      - PDG averages eight of the best nine ultracold-neutron measurements.
      - The quoted uncertainty includes a scale factor of 1.8.
  N1:
    label: latest_ucntau_bottle_only
    role: mandatory_robustness
    distribution: split_normal
    mode: 877.82
    sigma_minus: 0.2780288
    sigma_plus: 0.2973214
    uncertainty_combination: quadrature_of_statistical_and_directional_systematic
    published_components:
      sigma_stat: 0.22
      sigma_sys_minus: 0.17
      sigma_sys_plus: 0.20
    source_id: ucntau_arxiv_2409_05560_v1
  N2:
    label: yue_proton_detection_beam
    role: mandatory_robustness
    distribution: normal
    mean: 887.7
    sigma: 2.2472205
    uncertainty_combination: quadrature_of_statistical_and_systematic
    published_components:
      sigma_stat: 1.2
      sigma_sys: 1.9
    source_id: yue_arxiv_1309_2623_v2
  N3:
    label: beam_bottle_mixture
    role: mandatory_discrepancy_model
    distribution: finite_mixture
    weights:
      N1: 0.5
      N2: 0.5
    interpretation: >-
      A pre-registered sensitivity model for unresolved method discrepancy; it
      is not a claim that either component has posterior probability one half.

