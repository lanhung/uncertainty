modeling_rules:
  - Neutron lifetime and weak-rate theory corrections are separate uncertainty sources.
  - Do not add a neutron-lifetime effect twice through both tau_n and weak-rate normalization.
  - Report N0 through N3 for every flagship endpoint.
  - Selection among scenarios cannot depend on the observed Track B significance.
