schema_version: 3
scan_id: LINX-MAX-STEPS-DIAGNOSTIC-v3
status: protocol_frozen_measurements_pending
decision_date_utc: "2026-07-22"
task_id: P0-WHY-NOT-01
parent_scan: LINX-EXTENDED-CONVERGENCE-v2
parent_result: complete_with_failures_not_accepted
baseline: W0-LINX
source_revision: ec2e9d2ca455e8204137e884da29f5dd13a638fa
network: key_PRIMAT_2023
parameter_set: standard_bbn_fiducial
precision: float64
batch_size: 64
warm_repetitions: 3

rationale: >-
  V2 showed that rtol <= 3e-8 reaches LINX's default max_steps=4096. V3
  isolates the maximum-step control at the strict V2 production-candidate
  tolerance and weak-rate resolution. It retains the existing scalar/batch and
  0.001 observational-sigma invariance thresholds.

observation_normalization:
  source: configs/data/abundance_OBS-v1.yaml
  observables:
    YPBBN:
      source_field: main_likelihood.helium4_mass_fraction.sigma
      scale: 1.0
    DoH:
      source_field: main_likelihood.deuterium_number_ratio.sigma
      scale: 1.0e-5

cases:
  - id: max_steps_4096_control
    group: maximum_steps
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 2400
    max_steps: 4096
  - id: max_steps_8192
    group: maximum_steps
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 2400
    max_steps: 8192
  - id: max_steps_16384
    group: maximum_steps
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 2400
    max_steps: 16384
  - id: max_steps_32768
    group: maximum_steps
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 2400
    max_steps: 32768

acceptance:
  candidate_case_ids: [max_steps_16384, max_steps_32768]
  maximum_scalar_batch_difference_observation_sigma: 0.01
  maximum_plateau_difference_observation_sigma: 0.001
  plateau_pairs:
    max_steps_invariance: [max_steps_16384, max_steps_32768]
  require_zero_repeat_drift: true
  require_zero_within_batch_spread: true

decision_rule: >-
  The diagnostic passes only if both 16384 and 32768 complete, each satisfies
  the scalar/native-batch budget, and their scalar and batch abundance results
  differ by no more than 0.001 observational standard deviations. Lower-step
  failures remain evidence and are not required to pass.

scientific_boundary: >-
  Passing V3 establishes only that max_steps no longer controls the strict
  standard-point result over the registered 16384-to-32768 interval. A separate
  tolerance/sampling convergence scan and all gradient, posterior, extension
  and cross-solver gates remain required.
