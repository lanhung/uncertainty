schema_version: 4
scan_id: LINX-CONVERGENCE-RERUN-v4
status: protocol_frozen_measurements_pending
decision_date_utc: "2026-07-22"
task_id: P0-WHY-NOT-01
parent_scan: LINX-MAX-STEPS-DIAGNOSTIC-v3
parent_result: max_steps_invariance_accepted
baseline: W0-LINX
source_revision: ec2e9d2ca455e8204137e884da29f5dd13a638fa
network: key_PRIMAT_2023
parameter_set: standard_bbn_fiducial
precision: float64
batch_size: 64
warm_repetitions: 3

rationale: >-
  V3 established exact result invariance between max_steps=16384 and 32768 at
  the strict V2 candidate. V4 repeats the V2 tolerance and weak-rate sampling
  axes with max_steps fixed to the conservative accepted value 16384. No
  tolerance, sampling resolution or acceptance threshold is relaxed.

observation_normalization:
  source: configs/data/abundance_OBS-v1.yaml
  observables:
    YPBBN:
      source_field: main_likelihood.helium4_mass_fraction.sigma
      scale: 1.0
    DoH:
      source_field: main_likelihood.deuterium_number_ratio.sigma
      scale: 1.0e-5

cases:
  - id: tolerance_1e-7_sampling_2400
    group: tolerance
    rtol: 1.0e-7
    atol: 1.0e-10
    sampling_nTOp: 2400
    max_steps: 16384
  - id: tolerance_3e-8_sampling_2400
    group: tolerance
    rtol: 3.0e-8
    atol: 3.0e-11
    sampling_nTOp: 2400
    max_steps: 16384
  - id: production_candidate
    group: joint_candidate
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 2400
    max_steps: 16384
  - id: sampling_300_tolerance_1e-8
    group: weak_rate_sampling
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 300
    max_steps: 16384
  - id: sampling_600_tolerance_1e-8
    group: weak_rate_sampling
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 600
    max_steps: 16384
  - id: sampling_1200_tolerance_1e-8
    group: weak_rate_sampling
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 1200
    max_steps: 16384

acceptance:
  candidate_case_ids:
    - tolerance_1e-7_sampling_2400
    - tolerance_3e-8_sampling_2400
    - production_candidate
  maximum_scalar_batch_difference_observation_sigma: 0.01
  maximum_plateau_difference_observation_sigma: 0.001
  plateau_pairs:
    tolerance:
      - tolerance_3e-8_sampling_2400
      - production_candidate
    weak_rate_sampling:
      - sampling_1200_tolerance_1e-8
      - production_candidate
  require_zero_repeat_drift: true
  require_zero_within_batch_spread: true

decision_rule: >-
  Only a full pass may nominate production_candidate for a separate
  cross-solver fidelity audit. Any failed case or failed plateau keeps standard-
  point numerical convergence open. The threshold may not be raised after the
  run.

scientific_boundary: >-
  Passing V4 accepts only scalar/native-batch numerical convergence at the
  frozen standard-BBN point. Gradient, rate-nuisance derivative, posterior,
  extension and cross-solver gates remain separate and mandatory.
