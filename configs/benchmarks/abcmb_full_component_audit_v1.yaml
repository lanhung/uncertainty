schema_version: 1
audit_id: ABCMB-FULL-COMPONENT-AUDIT-v1
status: protocol_frozen_measurements_pending
decision_date_utc: "2026-07-22"
task_id: P0-WHY-NOT-01
execution_task_id: EXEC-ABCMB-FULL-AUDIT
source_revision: 5eabbab4ed7e53f264e16024743d1ba517845c37
bundled_linx_tree: 59b3ab7b3ada7d7ff6484920e0e29291cf4a084e
environment_lock: environments/abcmb-v0.3.1/uv.lock
backend: jax_cpu
precision: float64

spectra_cases:
  - id: S0_quick_default
    bbn_type: Table
    lmax: 500
    lensing: false
  - id: S1_table_unlensed
    bbn_type: Table
    lmax: 2500
    lensing: false
  - id: S2_table_lensed
    bbn_type: Table
    lmax: 2500
    lensing: true
  - id: S3_linx_unlensed
    bbn_type: linx
    linx_reaction_net: key_PRIMAT_2023
    nuclear_rates_q: all_zero
    lmax: 2500
    lensing: false
  - id: S4_linx_lensed
    bbn_type: linx
    linx_reaction_net: key_PRIMAT_2023
    nuclear_rates_q: all_zero
    lmax: 2500
    lensing: true

spectra_repetitions:
  cold: 1
  warm: 3
spectra_outputs: [ClTT, ClTE, ClEE, Pk, YHe, Neff]
spectra_acceptance:
  require_all_finite: true
  require_expected_shapes: true
  maximum_negative_noise_fraction_of_maximum: 1.0e-12
  maximum_relative_repeat_drift: 1.0e-10
  maximum_structured_failures: 0

gradient_audit:
  cases: [S1_table_unlensed, S3_linx_unlensed]
  coordinates: [h, omega_cdm, omega_b, A_s, n_s, tau_reion]
  linx_additional_coordinates: [Delta_Neff_init, tau_n_fac]
  nuclear_rates_q: all_zero_technical_coordinate_not_scientific_rate_claim
  summaries:
    log_Dell_TT_ell: [30, 200, 500, 1000, 2000]
    log_Dell_EE_ell: [30, 200, 500, 1000, 2000]
    TE_ell: [30, 200, 500, 1000, 2000]
    scalars: [YHe, Neff]
  ad_mode: jax_jacfwd
  finite_difference_step_fractions: [1.0e-3, 5.0e-4]
  acceptance:
    finite_fraction: 1.0
    maximum_relative_repeat_drift: 1.0e-8
    maximum_ad_fd_standardized_l2: 0.01
    minimum_ad_fd_cosine: 0.999
    maximum_fd_step_standardized_l2: 0.01

toy_fisher:
  status: authorized_interface_smoke_not_formal_fisher_gate
  covariance: cosmic_variance_asimov_f_sky_1_noise_0
  spectra: [TT, TE, EE]
  ell_range: [30, 500]
  acceptance:
    maximum_symmetry_error: 1.0e-10
    minimum_eigenvalue_relative_to_maximum: -1.0e-10
    report_rank: true
    report_condition_number: true

synthetic_recovery:
  status: authorized_asimov_interface_recovery_not_real_posterior
  coordinate: omega_b
  points: 41
  range_rule: CMB-v1_mean_plus_or_minus_4_sigma
  reference: exact_grid_posterior
  approximation: local_fisher_laplace
  acceptance:
    maximum_normalized_median_shift: 0.1
    credible_interval_ratio: [0.95, 1.05]
    topology_must_match: true

prohibited_current_claims:
  - formal_FISH-01_or_G0_to_G3_credit
  - real_data_or_matched_posterior_recovery
  - HMC_or_NUTS_acceptance
  - nuclear_rate_gradient_claim
  - GPU_performance_claim

resource_limits:
  maximum_worker_hours: 4
  dry_run_case: S0_quick_default
  dry_run_required_before_lmax_2500: true

scientific_boundary: >-
  Passing accepts only exact-source ABCMB component integrity, selected
  gradients, a toy Fisher interface and a one-dimensional Asimov recovery.
  The exact environment has no registered real likelihood/covariance or
  HMC/NUTS sampler; those claims remain unavailable.
