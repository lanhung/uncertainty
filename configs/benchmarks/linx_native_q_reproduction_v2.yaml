  values: [-1.0, 1.0]
  all_non_R0_entries: 0.0
  native_sampling_permitted: false
  vectors:
    - id: q0
      reaction: central
      q: 0.0
    - id: dp_gamma_he3_m1
      reaction: dp_gamma_he3
      q: -1.0
    - id: dp_gamma_he3_p1
      reaction: dp_gamma_he3
      q: 1.0
    - id: dd_n_he3_m1
      reaction: dd_n_he3
      q: -1.0
    - id: dd_n_he3_p1
      reaction: dd_n_he3
      q: 1.0
