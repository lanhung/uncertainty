schema_version: 2
scan_id: ABCMB-LINX-EXTENDED-CONVERGENCE-v2
status: protocol_frozen_measurements_pending
decision_date_utc: "2026-07-22"
task_id: P0-WHY-NOT-01
parent_scan: ABCMB-LINX-BATCH-CONSISTENCY-v1
parent_run: run-20260722T113106Z
parent_result: complete_not_accepted
baseline: W3-ABCMB
source_revision: 5eabbab4ed7e53f264e16024743d1ba517845c37
bundled_linx_tree: 59b3ab7b3ada7d7ff6484920e0e29291cf4a084e
network: key_PRIMAT_2023
parameter_set: standard_bbn_fiducial
precision: float64
batch_size: 64
warm_repetitions: 3

rationale: >-
  V1 completed without solver failures but did not establish a tolerance or
  weak-rate sampling plateau. V2 separates those axes at stricter settings,
  uses the conservative max_steps value already accepted by the independent
  W0 LINX diagnostic, and retains every V1 acceptance threshold unchanged.

background_numerics:
  rtol: 1.0e-8
  atol: 1.0e-10
  max_steps: 512

observation_normalization:
  source: configs/data/abundance_OBS-v1.yaml
  observables:
    YPBBN:
      source_field: main_likelihood.helium4_mass_fraction.sigma
      scale: 1.0
    DoH:
      source_field: main_likelihood.deuterium_number_ratio.sigma
      scale: 1.0e-5

cases:
  - id: tolerance_1e-7_sampling_2400
    group: tolerance
    rtol: 1.0e-7
    atol: 1.0e-10
    sampling_nTOp: 2400
    max_steps: 16384
  - id: tolerance_3e-8_sampling_2400
    group: tolerance
    rtol: 3.0e-8
    atol: 3.0e-11
    sampling_nTOp: 2400
    max_steps: 16384
  - id: production_candidate
    group: joint_candidate
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 2400
    max_steps: 16384
  - id: sampling_300_tolerance_1e-8
    group: weak_rate_sampling
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 300
    max_steps: 16384
  - id: sampling_600_tolerance_1e-8
    group: weak_rate_sampling
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 600
    max_steps: 16384
  - id: sampling_1200_tolerance_1e-8
    group: weak_rate_sampling
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 1200
    max_steps: 16384

acceptance:
  candidate_case_ids:
    - tolerance_1e-7_sampling_2400
    - tolerance_3e-8_sampling_2400
    - production_candidate
  maximum_scalar_batch_difference_observation_sigma: 0.01
  maximum_plateau_difference_observation_sigma: 0.001
  plateau_pairs:
    tolerance:
      - tolerance_3e-8_sampling_2400
      - production_candidate
    weak_rate_sampling:
      - sampling_1200_tolerance_1e-8
      - production_candidate
  require_zero_repeat_drift: true
  require_zero_within_batch_spread: true

decision_rule: >-
  Only a full pass may nominate the W3 bundled-LINX component for separate
  gradient, Fisher, HMC/NUTS and posterior-recovery audits. Any failed case or
  plateau keeps numerical convergence open. Thresholds may not be raised after
  execution.

scientific_boundary: >-
  Passing V2 accepts only ABCMB bundled-LINX scalar/native-batch numerical
  convergence at the frozen standard-BBN point. It does not accept the full
  ABCMB pipeline, gradients, rate-nuisance derivatives, Fisher matrices,
  HMC/NUTS, posterior recovery, extensions, or cross-solver fidelity.
