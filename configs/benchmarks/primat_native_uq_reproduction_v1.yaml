  - The reverse-rate rescale cap is built from median/QED rates and is not rebuilt per draw.
  - This native full-network-plus-weak prior is not the project R0 or ETR25 scientific prior.
  - The Python Monte Carlo backend is prohibited because the exact revision has a stale fill-buffer cache risk.
