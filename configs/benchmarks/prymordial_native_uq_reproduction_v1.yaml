    D_over_H:
      result_index: 5
      scale: 1.0e-05

native_prior:
  interpretation: upstream_demo_prior_not_project_scientific_prior
  baryon_density:
    distribution: fixed
    omega_b_h2: 0.0222
  delta_neff:
    distribution: fixed
    value: 0.0
  neutron_lifetime:
    distribution: normal
    mean_seconds: 878.4
    sigma_seconds: 0.5
  nuclear_rates:
    native_parameter_prefix: p_
    parameter_order_source: >-
      Ordered 63-name chained assignment initialized by
      np.zeros(num_reactions) in PRyM/PRyM_init.py.
    count: 63
    joint_distribution: independent_standard_normal
    mean: 0.0
    sigma: 1.0
    correlation_assumption: upstream_demo_identity_not_project_default

rng:
  master_seed: 240701
  numpy_bit_generator: PCG64DXSM
  per_draw_seed_sequence: SeedSequence_spawn
  draw_count: 1000
  bootstrap_seed: 240702
  bootstrap_resamples: 20000
  bootstrap_confidence: 0.99

execution:
  process_pool_start_method: spawn
  default_workers: 20
  maximum_workers: 22
  threads_per_process: 1
  required_thread_environment:
    OMP_NUM_THREADS: "1"
    MKL_NUM_THREADS: "1"
    OPENBLAS_NUM_THREADS: "1"
    NUMBA_NUM_THREADS: "1"
  checkpoint_every_completed_draws: 1
  no_failure_resampling: true
  sentinel_repeat_draw_indices: [0, 499, 999]
  require_resource_lease: cpu-heavy
  require_heartbeat_wrapper: true
  output_files:
    run_manifest: run_manifest.json
    draw_manifest: draw_manifest.jsonl
    results: results.jsonl
    failures: failures.jsonl
    state: run_state.json
    summary: summary.json

acceptance:
  expected_attempted_draws: 1000
  maximum_failure_fraction: 0.01
  minimum_successful_draws: 990
  maximum_repeat_relative_drift: 1.0e-12
  maximum_central_reference_offset_in_public_sigma: 0.25
  maximum_median_reference_offset_in_public_sigma: 0.25
  public_sigma_ratio_interval: [0.90, 1.10]
  require_public_sigma_inside_bootstrap_interval: true
  bootstrap_interval_quantiles: [0.005, 0.995]
  require_all_outputs_finite_and_positive: true
  require_unique_draw_ids: true
  require_complete_failure_accounting: true
  fail_closed_if_any_contract_check_is_missing: true

cost_boundary:
