schema_version: 1
protocol_id: PRYMORDIAL-NATIVE-UQ-REPRODUCTION-v1
task_id: UQ0-NATIVE-UQ-REPRO
status: frozen_before_registered_execution
decision_date_utc: "2026-07-23"

scientific_boundary:
  claim_level: C0_upstream_native_numerical_reproduction_only
  abundance_level_uq: true
  upstream_native_prior_only: true
  project_R0_prior_used: false
  accepted_scientific_prior: false
  production_authorized: false
  posterior_marginalization_reproduced: false
  scientific_signoff_provided: false
  interpretation: >-
    This protocol statistically reproduces the public PRyMordial abundance
    Monte Carlo at one public-table point. It does not select the project's R0
    nuclear prior, reconstruct unpublished draws, or reproduce a cosmological
    posterior.

