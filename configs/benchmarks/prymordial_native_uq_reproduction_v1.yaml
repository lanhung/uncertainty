  julia_flag: false
  aTid_flag: true
  compute_bckg_flag: true
  compute_nTOp_flag: true
  compute_nTOp_thermal_flag: false
  save_bckg_flag: false
  save_nTOp_flag: false
  save_nTOp_thermal_flag: false
