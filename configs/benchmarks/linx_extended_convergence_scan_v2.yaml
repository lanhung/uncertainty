schema_version: 2
scan_id: LINX-EXTENDED-CONVERGENCE-v2
status: protocol_frozen_measurements_pending
decision_date_utc: "2026-07-22"
task_id: P0-WHY-NOT-01
parent_scan: LINX-BATCH-TOLERANCE-v1
parent_result: complete_not_accepted
baseline: W0-LINX
source_revision: ec2e9d2ca455e8204137e884da29f5dd13a638fa
network: key_PRIMAT_2023
parameter_set: standard_bbn_fiducial
precision: float64
batch_size: 64
warm_repetitions: 3

rationale: >-
  V1 passed its scalar/native-batch budget but failed both convergence-plateau
  checks. V2 keeps the frozen 0.001 observational-sigma plateau threshold and
  separates abundance-solver tolerance convergence from weak-rate interpolation
  convergence. It does not relax or reinterpret the V1 result.

observation_normalization:
  source: configs/data/abundance_OBS-v1.yaml
  observables:
    YPBBN:
      source_field: main_likelihood.helium4_mass_fraction.sigma
      scale: 1.0
    DoH:
      source_field: main_likelihood.deuterium_number_ratio.sigma
      scale: 1.0e-5

cases:
  - id: tolerance_1e-7_sampling_2400
    group: tolerance
    rtol: 1.0e-7
    atol: 1.0e-10
    sampling_nTOp: 2400
  - id: tolerance_3e-8_sampling_2400
    group: tolerance
    rtol: 3.0e-8
    atol: 3.0e-11
    sampling_nTOp: 2400
  - id: production_candidate
    group: joint_candidate
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 2400
  - id: sampling_300_tolerance_1e-8
    group: weak_rate_sampling
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 300
  - id: sampling_600_tolerance_1e-8
    group: weak_rate_sampling
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 600
  - id: sampling_1200_tolerance_1e-8
    group: weak_rate_sampling
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 1200

acceptance:
  candidate_case_ids:
    - tolerance_1e-7_sampling_2400
    - tolerance_3e-8_sampling_2400
    - production_candidate
  maximum_scalar_batch_difference_observation_sigma: 0.01
  maximum_plateau_difference_observation_sigma: 0.001
  tolerance_plateau_pair:
    - tolerance_3e-8_sampling_2400
    - production_candidate
  sampling_plateau_pair:
    - sampling_1200_tolerance_1e-8
    - production_candidate
  require_zero_repeat_drift: true
  require_zero_within_batch_spread: true

decision_rule: >-
  Only a full pass may nominate production_candidate for a separate
  cross-solver fidelity audit. A failure keeps LINX native-batch numerical
  consistency open and requires diagnosis; it may not be repaired by raising
  the threshold after measurement.

scientific_boundary: >-
  Passing V2 accepts only scalar/native-batch numerical convergence at the
  frozen standard-BBN point. Gradients, rate-nuisance derivatives, posterior
  recovery, non-standard cosmology and cross-solver scientific fidelity remain
  separate gates.
