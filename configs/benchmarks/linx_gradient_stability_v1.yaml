decision_rule: >-
  Any failure at an acceptance point rejects the W0 standard-neighborhood
  gradient candidate. Passing accepts only three-coordinate gradients in this
  small standard neighborhood. The extreme upstream challenge is diagnostic
  and cannot by itself accept or reject the registered domain.

scientific_boundary: >-
  No rate-gradient, HMC, posterior, rate-prior, or non-standard-extension claim
  follows from this diagnostic. Delta N_eff scaling is numerical and is not a
  frozen scientific prior.
