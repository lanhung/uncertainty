  abundance:
    rtol: 1.0e-8
    atol: 1.0e-11
    sampling_nTOp: 2400
    max_steps: 16384

acceptance:
  require_all_cases_complete: true
  maximum_structured_failures: 0
  require_finite_outputs: true
  maximum_absolute_repeat_drift: 0.0
  require_exact_source_revision: true
  require_exact_input_derivations: true
  cross_baseline_abundance_differences_are_descriptive_only: true

decision_rule: >-
  A baseline passes only this standard-BBN reliability grid when every frozen
  case completes twice with finite outputs, zero structured failures, exact
  deterministic repeats, and exact source/input provenance. Cross-baseline
  abundance differences are pipeline discrepancies because rate libraries,
  weak physics and networks are not matched; they have no acceptance threshold.

scientific_boundary: >-
  Passing does not establish matched solver fidelity, rate-nuisance support,
  non-standard cosmology, posterior recovery, gradient validity, or emulator
  necessity. It supplies no progress credit to blocked solver-factor tasks.
